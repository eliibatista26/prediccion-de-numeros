name: Reset database (one-time)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Truncate Neon DB and re-populate with fresh data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'EOF'
          import os
          from lottery_predictor import db
          from lottery_predictor.scraper import scrape_conectate_date
          from datetime import date

          if not db.is_available():
              print("DATABASE_URL no configurado. Abortando.")
              exit(1)

          print("Configurando tabla...")
          db.setup()

          print("Vaciando tabla...")
          db.truncate()

          print("Scrapeando datos frescos de hoy...")
          results = scrape_conectate_date(date.today())
          print(f"Resultados obtenidos: {len(results)}")

          if results:
              inserted = db.save_results(results)
              print(f"Insertados en Neon: {inserted}")

          print("Reset completado.")
          EOF

      - name: Rebuild site and commit
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m lottery_predictor.cli

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Reset DB and rebuild site from scratch"
          file_pattern: "data/results.json docs/index.html docs/styles.css docs/predictions.json"
