name: Update lottery predictions

on:
  workflow_dispatch:
    inputs:
      full_analysis:
        description: "Recalcular análisis completo (sugeridos)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    - cron: "7,22,37,52 * * * *"   # Cada 15 min

permissions:
  contents: write

concurrency:
  group: update-lottery-predictions
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes first
        run: git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update results and static site
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          TODAY_RD=$(TZ=America/Santo_Domingo date +%Y-%m-%d)
          HOUR_RD=$(TZ=America/Santo_Domingo date +%H)
          LAST_ANALYSIS=$(cat docs/.last-analysis-date 2>/dev/null || echo "")
          FULL_ANALYSIS="${{ github.event.inputs.full_analysis }}"

          # Análisis completo: a las 11 PM hora de RD (una vez por día) O si se forzó manualmente
          if { [ "$LAST_ANALYSIS" != "$TODAY_RD" ] && [ "$HOUR_RD" -ge 23 ]; } || [ "$FULL_ANALYSIS" = "true" ]; then
            echo "Modo: ANÁLISIS COMPLETO (último: $LAST_ANALYSIS → hoy RD: $TODAY_RD, hora RD: $HOUR_RD)"
            python -m lottery_predictor.cli
            echo "$TODAY_RD" > docs/.last-analysis-date
          else
            echo "Modo: SOLO RESULTADOS (último análisis: $LAST_ANALYSIS, hora RD: $HOUR_RD)"
            python -m lottery_predictor.cli --preserve-predictions
          fi

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update lottery predictions"
          file_pattern: "data/results.json docs/index.html docs/styles.css docs/predictions.json docs/.last-analysis-date"
