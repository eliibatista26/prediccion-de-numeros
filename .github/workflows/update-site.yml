name: Update lottery predictions

on:
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"
    - cron: "20 12,18,22 * * *"

permissions:
  contents: write

concurrency:
  group: update-lottery-predictions
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes first
        run: git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update results and static site
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "DATABASE_URL set: $([ -n "$DATABASE_URL" ] && echo YES || echo NO)"
          python -m lottery_predictor.cli

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update lottery predictions"
          file_pattern: "data/results.json docs/index.html docs/styles.css docs/predictions.json"
