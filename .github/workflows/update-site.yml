name: Update lottery predictions

on:
  workflow_dispatch:
    inputs:
      full_analysis:
        description: "Recalcular análisis completo (sugeridos)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    - cron: "7,22,37,52 * * * *"   # Cada 15 min: actualiza resultados
    - cron: "0 3 * * *"             # 3 AM UTC (11 PM RD): análisis completo

permissions:
  contents: write

concurrency:
  group: update-lottery-predictions
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes first
        run: git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update results and static site
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          HOUR=$(date -u +%H)
          FULL_ANALYSIS="${{ github.event.inputs.full_analysis }}"

          # Análisis completo: run de las 3 AM UTC o workflow_dispatch con full_analysis=true
          if [ "$HOUR" = "03" ] || [ "$FULL_ANALYSIS" = "true" ]; then
            echo "Modo: ANÁLISIS COMPLETO (recalcula sugeridos)"
            python -m lottery_predictor.cli
          else
            echo "Modo: SOLO RESULTADOS (preserva sugeridos de hoy)"
            python -m lottery_predictor.cli --preserve-predictions
          fi

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update lottery predictions"
          file_pattern: "data/results.json docs/index.html docs/styles.css docs/predictions.json"
